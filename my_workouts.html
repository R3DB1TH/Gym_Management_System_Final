{% extends "base.html" %}
{% block title %}My Workouts{% endblock %}
{% block content %}

<div class="page-wrapper">
  <h1>🏃 My Workout Schedule</h1>

  <div class="card" style="border-top: 4px solid #4CAF50;">
    {% for w in workouts %}
      <div style="margin-bottom: 15px;">
        <h4>{{ w.workout_type }}</h4>
        <p>{{ w.schedule_details }}</p>
      </div>
      <hr>
    {% else %}
      <p>No workouts assigned.</p>
    {% endfor %}
  </div>
</div>

{% endblock %}

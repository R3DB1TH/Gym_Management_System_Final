{% extends "base.html" %}
{% block title %}Edit Workout - Admin{% endblock %}
{% block content %}
<div class="page-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2>🏋️‍♂️ Edit Workout Schedule</h2>
            <p class="text-muted">Modify the workout plan for this member.</p>
        </div>
    </div>

    <div class="card shadow-sm mb-5" style="border-radius: 15px; border: none;">
        <div class="card-header bg-primary text-white" style="border-radius: 15px 15px 0 0;">
            <h4 class="mb-0"><i class="fas fa-edit"></i> Edit Plan Details</h4>
        </div>
        <div class="card-body bg-white p-4">
            <form method="POST">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <label class="form-label font-weight-bold">Workout Type / Focus</label>
                        <input type="text" name="workout_type" class="form-control"
                            value="{{ workout.workout_type }}" required
                            style="border: 2px solid #e0e0e0; height: 50px; border-radius: 8px;">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label font-weight-bold">Workout Schedule (Daily Breakdown)</label>
                    <textarea name="schedule_details" class="form-control" rows="10"
                        required
                        style="resize: vertical; border: 2px solid #e0e0e0; border-radius: 8px; padding: 15px;">{{ workout.schedule_details }}</textarea>
                </div>

                <div class="text-right">
                    <a href="/admin/assign_workout" class="btn btn-outline-secondary btn-lg px-4 mr-2" style="border-radius: 50px;">Cancel</a>
                    <button type="submit" class="btn btn-primary btn-lg px-5 shadow"
                        style="border-radius: 50px; font-weight: 600;">
                        <i class="fas fa-save"></i> Update Workout Plan
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .page-wrapper {
        padding: 20px;
        background-color: #f8f9fa;
        min-height: 100vh;
    }

    .btn-primary {
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
        border: none;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 20px rgba(37, 117, 252, 0.4);
    }

    .form-control:focus {
        border-color: #2575fc !important;
        box-shadow: 0 0 0 0.2rem rgba(37, 117, 252, 0.1);
    }
</style>
{% endblock %}

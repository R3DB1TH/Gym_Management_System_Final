{% extends "base.html" %}
{% block title %}Edit Payment - Admin{% endblock %}
{% block content %}
<div class="page-wrapper narrow">
  <div class="card">
    <h2 class="text-center">Edit Payment Record</h2>
    <p class="text-center text-muted mb-4">Update transaction details for Member ID: {{ payment['member_id'] }}</p>

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Member (Name & ID)</label>
        <select name="member_id" class="form-control" required>
          {% for m in members %}
          <option value="{{ m.id }}" {% if m.id == payment['member_id'] %}selected{% endif %}>
            {{ m.name }} (ID: {{ m.id }})
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Membership Plan</label>
        <select name="plan_id" class="form-control" required>
          {% for p in plans %}
          <option value="{{ p.id }}" {% if p.id == payment['plan_id'] %}selected{% endif %}>
            {{ p.plan_name }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Amount ($)</label>
        <input type="number" step="0.01" name="amount" class="form-control" value="{{ payment['amount'] }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Payment Status</label>
        <select name="payment_status" class="form-control">
          <option value="Paid" {% if payment['payment_status'] == 'Paid' %}selected{% endif %}>Paid</option>
          <option value="Pending" {% if payment['payment_status'] == 'Pending' %}selected{% endif %}>Pending</option>
          <option value="Failed" {% if payment['payment_status'] == 'Failed' %}selected{% endif %}>Failed</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Payment Date (YYYY-MM-DD)</label>
        <input type="date" name="payment_date" class="form-control" value="{{ payment['payment_date'] }}" required>
      </div>
      
      <div class="form-grid-2">
        <button type="submit" class="btn btn-primary">Update Payment</button>
        <a href="/admin/payments" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
